summary: |
  Claude Sonnet 5 launched June 30, 2026 as Anthropic's mid-tier workhorse —
  "the best combination of speed and intelligence" in the company's own
  positioning — and the default model for Free and Pro plans on claude.ai.

  Its headline is the pricing timeline: an introductory $2 per million input
  tokens and $10 per million output runs through August 31, 2026, after which
  standard $3/$15 pricing applies. During the intro window it undercuts
  GPT-5.6 Terra ($2.50/$15) while carrying the same 1,000,000-token context
  window and a 128,000-token output cap.

  Like Opus 4.8 and Fable 5, it shares the January 2026 knowledge cutoff and
  the newer Claude tokenizer, and supports adaptive thinking with effort
  control defaulting to high on the API.
faq:
  - q: How much does Claude Sonnet 5 cost?
    a: >-
      $2 per 1M input and $10 per 1M output tokens through August 31, 2026;
      from September 1 the standard rate is $3/$15. Batch halves either rate.
  - q: What is Claude Sonnet 5's context window?
    a: >-
      1,000,000 tokens at standard pricing, with 128,000 max output tokens
      (300,000 via the Batch API extended-output beta).
