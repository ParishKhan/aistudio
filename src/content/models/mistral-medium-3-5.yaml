summary: |
  Mistral Medium 3.5 (version 26.04) is Mistral AI's frontier-class model,
  released April 28, 2026 and optimized for agentic and coding use cases. Its
  differentiator among flagships is the license: the weights ship under a
  modified MIT license, so teams can run it on their own infrastructure. No
  other current frontier model in our database pairs open weights with a
  vendor-hosted API this capable.

  On Mistral's La Plateforme it costs $1.50 per million input tokens and
  $7.50 per million output, with a 256K (262,144-token) context window and
  text-plus-image input. Reported third-party analyses describe it as a
  dense 128B-parameter model.

  For European-hosted deployments, self-hosting requirements, or
  cost-sensitive agentic work, it is the leading open-weight flagship
  alternative to the closed US models.
faq:
  - q: Is Mistral Medium 3.5 open source?
    a: >-
      The weights are released under a modified MIT license, so it can be
      self-hosted; check the license text for the exact modifications.
  - q: How much does Mistral Medium 3.5 cost?
    a: >-
      $1.50 per 1M input tokens and $7.50 per 1M output on Mistral's API,
      or run the open weights on your own hardware.
