summary: |
  GPT-5.5 was OpenAI's frontier model from its April 23, 2026 snapshot until
  the GPT-5.6 family arrived on July 9, 2026. It remains available in the API
  at the same $5/$30 pricing as its successor GPT-5.6 Sol, which beats it on
  every benchmark OpenAI reports while using fewer tokens.

  It carries a 1,050,000-token context window and 128,000-token max output,
  with one notable pricing quirk: sessions with more than 272K input tokens
  are billed at 2× input and 1.5× output rates. A separate GPT-5.5 Pro tier
  ($30/$180) serves the highest-effort professional work.

  For new work, OpenAI's own launch data makes GPT-5.6 Sol the better buy at
  identical prices; GPT-5.5 mainly matters for teams with pinned snapshots.
faq:
  - q: Is GPT-5.5 still available?
    a: >-
      Yes, gpt-5.5 and the gpt-5.5-2026-04-23 snapshot remain in the API at
      $5/$30 per 1M tokens, though GPT-5.6 Sol supersedes it at the same price.
  - q: Should I use GPT-5.5 or GPT-5.6 Sol?
    a: >-
      Sol costs the same and scores higher on every benchmark OpenAI has
      published, so Sol is the default choice unless you depend on a pinned
      GPT-5.5 snapshot.
lastVerified: 2026-07-18
