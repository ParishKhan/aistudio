summary: |
  GPT-5.6 Terra is the balanced everyday model in OpenAI's GPT-5.6 family,
  released July 9, 2026 between the flagship Sol and the cost-efficient Luna.
  OpenAI positions Terra as matching or beating the previous flagship GPT-5.5
  on most benchmarks at half the price: it edges GPT-5.5 on SWE-Bench Pro
  (63.4% vs 59.4%) and Terminal-Bench 2.1 (87.4% vs 85.6%) in OpenAI's own
  reporting.

  Terra shares the family's core specs: a 1,050,000-token context window,
  128,000-token max output, text-and-image input, and the new Programmatic
  Tool Calling capability in the Responses API. At $2.50 per million input
  tokens and $15 per million output, it sits in the same price band as
  Claude Sonnet 5 and Gemini 3.1 Pro.
faq:
  - q: How is GPT-5.6 Terra different from Sol?
    a: >-
      Terra is the mid-tier model at half Sol's price ($2.50/$15 vs $5/$30 per
      1M tokens). Sol scores higher on every benchmark OpenAI reports, but
      Terra beats the previous flagship GPT-5.5 on most coding evals.
  - q: What is GPT-5.6 Terra's context window?
    a: 1,050,000 tokens, with up to 128,000 output tokens, the same as Sol and Luna.
