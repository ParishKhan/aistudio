summary: |
  Claude Haiku 4.5 is Anthropic's speed-and-cost tier, released October 15,
  2025 and still the lineup's fastest model in mid-2026. At $1 per million
  input tokens and $5 per million output, it competes directly with GPT-5.6
  Luna and Gemini 3.5 Flash on price.

  It is the oldest current model in Anthropic's lineup, which shows in two
  specs: a 200,000-token context window (versus 1M for the rest of the
  current Claude family) and a February 2025 reliable knowledge cutoff. It
  remains the only current Claude model with classic extended thinking rather
  than adaptive thinking.

  For high-volume, latency-sensitive work that fits in 200K tokens — support
  triage, extraction, routing, sub-agents — it remains Anthropic's
  cost-per-token champion.
faq:
  - q: How much does Claude Haiku 4.5 cost?
    a: >-
      $1 per 1M input tokens and $5 per 1M output tokens, with cache reads at
      $0.10/1M and batch rates of $0.50/$2.50.
  - q: What is Claude Haiku 4.5's context window?
    a: >-
      200,000 tokens with up to 64,000 output tokens — smaller than the 1M
      window on current Opus, Sonnet, and Fable models.
