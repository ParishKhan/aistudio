summary: |
  DeepSeek V4 Pro is the flagship of DeepSeek's V4 generation, released in
  preview on April 24, 2026 with the official version following in mid-July.
  Reported as a 1.6-trillion-parameter model with weights published under an
  MIT license, it anchors the open-weight end of the frontier at prices an
  order of magnitude below US flagships: $0.435 per million input tokens and
  $0.87 per million output.

  Like V4 Flash it carries a 1,000,000-token context window and a
  class-leading 384,000-token output cap. The V4 launch marked the moment
  1M-token context became standard for open-weight models.

  The trade-offs: text-only modalities, an API hosted in China with announced
  peak-time price doubling during Chinese business hours, and no published
  first-party scores on the Western benchmark suites we track — evaluate on
  your own workload.
faq:
  - q: How much does DeepSeek V4 Pro cost?
    a: >-
      $0.435 per 1M input tokens (cache miss), $0.003625 on cache hits, and
      $0.87 per 1M output — with announced peak-time doubling during Chinese
      business hours.
  - q: Is DeepSeek V4 Pro open source?
    a: >-
      The weights are published under an MIT license (reported at 1.6T
      parameters), so it can be self-hosted or served by third-party
      inference providers.
