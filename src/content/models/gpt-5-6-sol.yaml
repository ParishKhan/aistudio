summary: |
  GPT-5.6 Sol is the flagship of OpenAI's GPT-5.6 family, released July 9,
  2026 alongside the mid-tier Terra and cost-efficient Luna. OpenAI positions
  Sol as its most capable model for coding, knowledge work, cybersecurity, and
  science, with an emphasis on efficiency: state-of-the-art results using
  fewer output tokens than both its predecessor GPT-5.5 and competing frontier
  models.

  Sol accepts text and image input across a 1,050,000-token context window and
  produces up to 128,000 output tokens. New platform features introduced with
  the family include Programmatic Tool Calling — the model writes and runs
  small in-memory programs that coordinate tools without round-tripping every
  result — and a multi-agent beta in the Responses API. An `ultra` setting
  coordinates four parallel agents by default for the hardest tasks.

  At $5 per million input tokens and $30 per million output, Sol matches
  GPT-5.5's pricing while outscoring it on every benchmark OpenAI reports.
  The `gpt-5.6` API alias routes to Sol.
faq:
  - q: What is GPT-5.6 Sol's context window?
    a: >-
      1,050,000 tokens, with a maximum of 128,000 output tokens. It accepts
      text and image input and produces text output.
  - q: How much does GPT-5.6 Sol cost?
    a: >-
      $5.00 per 1M input tokens and $30.00 per 1M output tokens. Cached input
      costs $0.50/1M, and the Batch API halves prices to $2.50/$15.00.
  - q: What is the difference between GPT-5.6 Sol, Terra, and Luna?
    a: >-
      Sol is the flagship for the hardest work; Terra is the balanced everyday
      model at $2.50/$15 per 1M tokens; Luna is the fastest and cheapest at
      $1/$6. The tier names are durable and advance on their own cadence.
  - q: What is GPT-5.6 Sol's knowledge cutoff?
    a: February 16, 2026, per OpenAI's model documentation.
