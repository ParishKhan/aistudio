summary: |
  DeepSeek V4 Flash is the smaller of DeepSeek's two V4 models, released as a
  preview on April 24, 2026 with the official version following in mid-July.
  It is, by a wide margin, the cheapest 1M-token-context model in our
  database: $0.14 per million input tokens and $0.28 per million output —
  roughly 35× cheaper than GPT-5.6 Sol on input.

  Reported as a 284B-parameter model with open weights under an MIT license,
  it also posts the largest output cap we track at 384,000 tokens, and its
  aggressive cache pricing ($0.0028 per million on cache hits) makes
  repeated-context workloads nearly free.

  One caveat unique to DeepSeek: with the official V4 release the API adds
  peak-time pricing, doubling rates during Chinese business hours. Off-peak
  batch workloads get the full discount.
faq:
  - q: How much does DeepSeek V4 Flash cost?
    a: >-
      $0.14 per 1M input tokens (cache miss), $0.0028 on cache hits, and
      $0.28 per 1M output — with announced peak-time doubling during
      9AM–12PM and 2PM–6PM Beijing time.
  - q: What happened to deepseek-chat and deepseek-reasoner?
    a: >-
      They currently map to V4 Flash's non-thinking and thinking modes and
      will be retired on July 24, 2026 — migrate to deepseek-v4-flash.
