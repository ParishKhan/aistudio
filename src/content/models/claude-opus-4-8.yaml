pricingNotes: >-
  The full 1M context is billed at standard rates with no long-context surcharge.
  5-minute cache writes cost 1.25× input ($6.25/1M); 1-hour cache writes cost
  2× ($10/1M); cache reads cost 10% of input. Fast mode (research preview,
  ~2.5× output speed) is $10/$50 per 1M. US-only inference (inference_geo:
  "us") adds a 1.1× multiplier.
