description: >-
  Claude Opus 4.8 is Anthropic's flagship for agentic coding and enterprise
  work (May 2026): 1M context, $5/$25 per 1M tokens, fast mode at 2.5× speed.
  Full specs, pricing, and sourced benchmark scores.
summary: |
  Claude Opus 4.8 is Anthropic's flagship model for complex agentic coding and
  enterprise work, released May 28, 2026 as an upgrade over Opus 4.7 at the
  same price. Anthropic highlights improved judgment and honesty: its
  evaluations found Opus 4.8 roughly four times less likely than its
  predecessor to let flaws in its own code pass unremarked.

  The model reads text, images, and PDFs across a 1,000,000-token context
  window billed at standard rates the whole way, so a 900K-token request costs
  the same per token as a 9K one. Output tops out at 128,000 tokens (300,000
  on the Batch API via a beta header). It launched alongside dynamic
  workflows in Claude Code, which lets it run hundreds of parallel subagents
  for codebase-scale migrations, and a fast mode that trades a 2× price
  premium for roughly 2.5× output speed.

  Anthropic's higher-capability tier, Claude Fable 5 ($10/$50), sits above
  Opus 4.8 for the hardest long-horizon work, while Sonnet 5 and Haiku 4.5
  cover the speed- and cost-sensitive end of the lineup.
faq:
  - q: What is Claude Opus 4.8's context window?
    a: >-
      1,000,000 tokens at standard pricing with no long-context surcharge, and
      up to 128,000 output tokens (300,000 via the Batch API extended-output
      beta).
  - q: How much does Claude Opus 4.8 cost?
    a: >-
      $5.00 per 1M input tokens and $25.00 per 1M output tokens, unchanged
      from Opus 4.7. Batch API halves that to $2.50/$12.50; cache reads cost
      $0.50/1M. Fast mode costs $10/$50.
  - q: What is fast mode?
    a: >-
      A research-preview option where Opus 4.8 generates output at roughly
      2.5× standard speed for $10/$50 per 1M tokens, three times cheaper than
      fast mode was for Opus 4.7.
  - q: How does Opus 4.8 relate to Claude Fable 5?
    a: >-
      Fable 5 ($10/$50) is Anthropic's most capable widely available model;
      Opus 4.8 is the mainstream flagship for agentic coding and enterprise
      work at half the price. Both have 1M context and a January 2026
      knowledge cutoff.
