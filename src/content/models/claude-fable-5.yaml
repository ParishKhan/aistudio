summary: |
  Claude Fable 5 is the first Mythos-class model Anthropic has made generally
  available, a capability tier the company places above its Opus line. It
  launched June 9, 2026 at $10 per million input tokens and $50 per million
  output, was briefly suspended three days later, and returned to general
  availability on July 1.

  Anthropic reports state-of-the-art results on nearly all tested benchmarks,
  with the lead over other models growing as tasks get longer: its
  OpenAI-reported 80% on SWE-Bench Pro is the highest score in our database.
  During early testing, Stripe reported Fable 5 completed a codebase-wide
  migration in a 50-million-line Ruby codebase in a day.

  The distinctive trade-off is safety routing: classifier-flagged requests in
  cybersecurity, biology/chemistry, and suspected distillation fall back to
  Claude Opus 4.8, which Anthropic says affects under 5% of sessions. A
  sibling model, Claude Mythos 5, is the same model with cyber safeguards
  lifted, restricted to approved defenders under Project Glasswing.
faq:
  - q: How much does Claude Fable 5 cost?
    a: >-
      $10 per 1M input tokens and $50 per 1M output tokens, double Claude
      Opus 4.8. Batch API halves that; cache reads cost $1/1M.
  - q: What is a Mythos-class model?
    a: >-
      Anthropic's tier above Opus in capability. Fable 5 is the
      safeguarded general release; Mythos 5 is the same model with cyber
      safeguards lifted for approved organizations in Project Glasswing.
  - q: Why do some Fable 5 requests get answered by Opus 4.8?
    a: >-
      Safety classifiers route requests touching cybersecurity, biology and
      chemistry, or suspected distillation to Claude Opus 4.8. Anthropic
      reports over 95% of sessions involve no fallback.
  - q: What is Claude Fable 5's context window?
    a: >-
      1,000,000 tokens at standard pricing, with 128,000 max output tokens.
      Note it uses a newer tokenizer that produces roughly 30% more tokens for
      the same text than pre-Opus-4.7 models.
