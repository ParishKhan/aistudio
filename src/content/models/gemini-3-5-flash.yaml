summary: |
  Gemini 3.5 Flash is Google's stable workhorse — "sustained frontier
  performance on agentic and coding tasks" in Google's positioning — updated
  May 2026. Google notably describes it as more intelligent than the
  Preview-labeled 3.1 Pro on sustained agentic work, making it the
  recommended default for most Gemini API workloads.

  It keeps the Gemini hallmarks: 1,048,576-token context, text/image/video/
  audio/PDF input, and Google's serving-tier menu (half-price Batch and
  Flex, 1.8× Priority). At $1.50 per million input tokens and $9 per million
  output, it sits between GPT-5.6 Luna and Terra on price.

  Unlike 3.1 Pro, it supports computer use, and it is a stable (non-preview)
  model — the safer bet for production Gemini deployments.
faq:
  - q: How much does Gemini 3.5 Flash cost?
    a: >-
      $1.50 per 1M input tokens and $9 per 1M output. Batch and Flex halve
      that; Priority inference costs 1.8× standard.
  - q: Should I use Gemini 3.5 Flash or 3.1 Pro?
    a: >-
      Flash is stable, cheaper, supports computer use, and Google positions it
      as its most intelligent model for sustained agentic tasks; 3.1 Pro
      (Preview) targets complex problem-solving and precise tool usage.
