summary: |
  v0 is Vercel's generative app builder, best known for producing
  production-quality React and Next.js interfaces styled with Tailwind and
  shadcn/ui. It pairs chat-driven generation with a visual Design Mode, syncs
  to GitHub, and deploys to Vercel in one click, the natural choice if your
  stack already lives on Vercel.

  Pricing is dollar-denominated credits: the free tier includes $5 of monthly
  credits with a 7-message daily cap, Plus is $30 per user with $30 of
  credits plus $2 daily login credits, and Business at $100 per user adds
  training opt-out by default. Enterprise brings SAML SSO and a guarantee
  that data is never used for training.
