description: >-
  Replit pairs a cloud IDE with Replit Agent, which builds and deploys apps
  from prompts. Free Starter tier; Core at $25/mo and Pro at $100/mo with
  usage credits and parallel agents.
summary: |
  Replit is the longest-running cloud IDE, now centered on Replit Agent — an
  autonomous builder that takes a prompt to a deployed app with hosting and a
  database on Replit's own infrastructure. Its president publicly cites
  Claude Fable 5 as the top performer on Replit's internal ViBench
  vibe-coding benchmark.

  Pricing is credit-based with effort-based (pay-as-you-go) overages: the
  free Starter tier includes daily agent credits, Core is $25/month ($20
  annual) with $25 of credits and two parallel agents, and Pro is $100/month
  with $100 in credits, ten parallel agents, and access to the most powerful
  models.
faq:
  - q: How much does Replit cost?
    a: >-
      Starter is free with daily agent credits. Core is $25/month ($20 billed
      annually) with $25 of credits; Pro is $100/month with $100 of credits;
      Enterprise is custom.
  - q: What models power Replit Agent?
    a: >-
      Replit uses frontier models from Anthropic and OpenAI under the hood,
      with its Pro tier advertising access to the most powerful models.
