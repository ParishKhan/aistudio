description: >-
  Bolt (bolt.new) by StackBlitz builds and hosts full-stack apps in the
  browser via WebContainers. Free tier with 1M tokens/month; Pro $25/mo from
  10M tokens; Teams $30/member.
summary: |
  Bolt is StackBlitz's prompt-to-app builder, distinctive for running the
  entire dev environment in your browser tab via WebContainers — installs,
  builds, and previews execute client-side, with hosting and databases
  included when you publish.

  Pricing is token-metered rather than credit-metered: the free tier allows
  300K tokens per day up to 1M per month, Pro at $25/month starts at 10M
  tokens with unused tokens rolling over, and Teams at $30 per member adds
  centralized billing, private NPM registries, and design-system knowledge
  with per-package prompts.
faq:
  - q: How much does Bolt cost?
    a: >-
      Free with a 300K-token daily limit (1M/month); Pro at $25/month starting
      at 10M tokens with rollover; Teams at $30 per member; Enterprise custom.
  - q: What makes Bolt different from Lovable or v0?
    a: >-
      Bolt runs the full dev environment in-browser via StackBlitz
      WebContainers, and its pricing is transparently token-based rather than
      abstracted into credits.
lastVerified: 2026-07-18
