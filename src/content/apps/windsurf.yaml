summary: |
  Windsurf began as Codeium's AI-native editor and was acquired by Cognition
  (maker of the Devin autonomous engineer) in 2025. As of mid-2026 the merger
  is complete enough that windsurf.com redirects to devin.ai, and the editor
  is sold as part of Cognition's unified platform alongside Devin's cloud
  agents and the in-house SWE model family.

  The current plans mirror classic Windsurf tiers: a free tier with limited
  models, Pro at $20/month with frontier models from OpenAI, Anthropic, and
  Google plus free use of Cognition's SWE 1.7, and a $200 Max tier for heavy
  usage. Teams pricing runs $80/month plus $40 per developer seat.

  Choose it over Cursor if you want the same subscription to cover both an
  AI editor and Devin-style autonomous cloud agents.
faq:
  - q: Is Windsurf still a separate product?
    a: >-
      The editor still exists, but Cognition has folded it into the Devin
      platform — windsurf.com now redirects to devin.ai and plans are unified
      with Devin's cloud agents.
  - q: How much does Windsurf (Devin) cost?
    a: >-
      Free tier; Pro at $20/month; Max at $200/month; Teams at $80/month plus
      $40 per developer seat; custom Enterprise pricing.
