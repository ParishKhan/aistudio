summary: |
  Cursor, by Anysphere, is the reference AI-native code editor — a VS Code
  fork rebuilt around an agent that can plan, edit, and verify changes across
  a codebase. It pairs frontier models from OpenAI, Anthropic, Google, and
  SpaceXAI with its own Composer models and Tab completions, plus Bugbot for
  agentic code review.

  Cursor is deeply wired into the model ecosystem: SpaceXAI trained Grok 4.5
  alongside Cursor, and both OpenAI and Anthropic quote CursorBench results
  in their flagship launches. The Individual plan is $20/month; Teams adds
  administration, SSO, and a shared marketplace at $40 per user.
faq:
  - q: How much does Cursor cost?
    a: >-
      A free Hobby tier with limited agent requests; Individual at $20/month
      with extended limits and frontier-model access; Teams at $40 per user
      per month; custom Enterprise pricing.
  - q: Which models does Cursor support?
    a: >-
      Frontier models across vendors — including GPT-5.6, Claude Opus
      4.8/Fable 5, Gemini, and Grok 4.5 (free for a limited time at launch) —
      plus Cursor's own Composer models.
