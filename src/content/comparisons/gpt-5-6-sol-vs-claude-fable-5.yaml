a: gpt-5-6-sol
b: claude-fable-5
verdict: |
  This is the frontier matchup of mid-2026: OpenAI's efficiency play against
  Anthropic's raw-capability play. Claude Fable 5 holds the strongest
  agentic-coding score in our database (80% on SWE-Bench Pro vs Sol's 64.6%),
  and OpenAI's own Artificial Analysis Intelligence Index comparison puts
  Fable one point ahead. But Sol costs half as much ($5/$30 vs $10/$50 per 1M
  tokens), and OpenAI reports it completes comparable work with fewer tokens
  and less time — its Agents' Last Exam and Terminal-Bench scores lead.

  Practical read: for long-horizon autonomous engineering where per-task
  quality dominates cost, Fable 5 is the strongest model available. For
  high-volume agents and knowledge work where cost-per-result matters, Sol's
  price-performance is hard to beat. Also note Fable's safety routing: some
  cybersecurity and biology requests silently fall back to Opus 4.8.
faq:
  - q: Which is cheaper, GPT-5.6 Sol or Claude Fable 5?
    a: >-
      GPT-5.6 Sol, by half: $5/$30 per 1M input/output tokens vs $10/$50 for
      Claude Fable 5.
  - q: Which is better at coding?
    a: >-
      Fable 5 reports the higher SWE-Bench Pro score (80% vs 64.6%), while
      Sol leads on Terminal-Bench 2.1 (88.8% vs 83.1%). Fable tends to win
      long-horizon repository work; Sol wins terminal-driven tasks and token
      efficiency.
  - q: Do they have the same context window?
    a: >-
      Nearly — Sol offers 1,050,000 tokens vs Fable's 1,000,000, both with
      128K max output. Note Fable's newer tokenizer produces ~30% more tokens
      for the same text.
