name: Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate types and data
        run: npm run check && npm run check:data

      - name: Build
        run: npm run build

      - name: Deploy (production)
        if: github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fe51a78f29e2827a9c0e6e99494ff0a1
          command: deploy

      - name: Preview upload (PR)
        if: github.event_name == 'pull_request' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: fe51a78f29e2827a9c0e6e99494ff0a1
          command: versions upload
